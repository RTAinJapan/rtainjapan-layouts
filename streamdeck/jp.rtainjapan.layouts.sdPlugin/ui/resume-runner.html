<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="走者">
			<sdpi-select setting="index">
				<option value="0">走者 1</option>
				<option value="1">走者 2</option>
				<option value="2">走者 3</option>
				<option value="3">走者 4</option>
			</sdpi-select>
		</sdpi-item>

		<hr />

		<sdpi-item label="NodeCG URL">
			<sdpi-textfield
				setting="url"
				global
				placeholder="http://localhost:9090"
			></sdpi-textfield>
		</sdpi-item>
		<sdpi-item label="Bundle 名">
			<sdpi-textfield
				setting="bundleName"
				global
				placeholder="rtainjapan-layouts"
			></sdpi-textfield>
		</sdpi-item>
		<sdpi-item label="認証キー (任意)">
			<sdpi-password setting="key" global></sdpi-password>
		</sdpi-item>
	</body>
</html>
