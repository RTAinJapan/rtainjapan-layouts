name: CI

permissions:
  packages: write

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "npm"
      - run: npm ci
      - run: npm run test:prettier
      - run: npm run schema-types
      - run: npm run test:lint
      - run: npm run test:types
      - run: npm run build

  screenshot:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "npm"
      - run: npm ci
        env:
          # postinstall の自動 Chrome DL を無効化し、ブラウザ取得は下の明示ステップに一本化する。
          # 自動DLはフォルダだけ作って本体DLが未完になることがあり、その後の install が
          # 「フォルダは在るが実行ファイルが無い」で失敗するため。
          PUPPETEER_SKIP_DOWNLOAD: "true"
      - run: npm run schema-types
      - run: npm run build
      # ロック版 puppeteer 自身のインストーラで pin された版の Chrome を取得する。
      - run: node node_modules/puppeteer/install.mjs
      # install.mjs は DL 失敗を握り潰して exit 0 し得るため、直後に存在を検証する。
      # executablePath() は puppeteer が起動時に探すのと同じパスを返し、
      # 見つからなければ throw するので、ここで失敗を顕在化できる。
      - name: Verify Chrome is installed
        run: |
          ls -la ~/.cache/puppeteer/chrome || true
          node -e "console.log('executablePath:', require('puppeteer').executablePath())"
      - name: Set up NodeCG host and run screenshot regression
        run: npm run screenshot:ci
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: test/screenshots
          if-no-files-found: warn
